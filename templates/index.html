<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Diabetes Prediction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* Mengubah font dan background dasar */
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      max-width: 650px; 
      margin: 40px auto; 
      padding: 24px; 
      background-color: #fff5f7; /* Background pink sangat muda */
      color: #4a3b40; /* Warna teks gelap lembut */
    }

    /* Judul Utama */
    h1 {
      text-align: center;
      color: #d81b60; /* Pink fuchsia tua */
      margin-bottom: 24px;
      font-size: 28px;
    }

    /* Kotak Hasil Prediksi */
    .result { 
      margin-bottom: 24px; 
      font-weight: 600; 
      background-color: #fce4ec; /* Background box pink */
      border-left: 5px solid #ec407a; /* Aksen garis pink cerah */
      padding: 16px;
      border-radius: 8px;
      color: #c2185b;
      box-shadow: 0 2px 4px rgba(236, 64, 122, 0.1);
    }

    /* Desain Form Utama */
    form { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 16px; 
      background: #ffffff; 
      padding: 28px; 
      border-radius: 16px; 
      box-shadow: 0 4px 15px rgba(216, 27, 96, 0.08); /* Shadow halus bernuansa pink */
    }

    /* Label Input */
    label { 
      display: block; 
      font-size: 13px; 
      font-weight: 600;
      margin-bottom: 6px; 
      color: #880e4f; /* Warna teks label maroon-pink */
    }

    /* Desain Input & Select Box */
    input, select { 
      width: 100%; 
      padding: 10px 14px; 
      box-sizing: border-box; 
      border: 1.5px solid #f8bbd0; /* Border pink muda */
      border-radius: 8px;
      font-size: 14px;
      background-color: #fff9fa;
      transition: all 0.3s ease;
    }

    /* Efek Fokus saat Input diklik */
    input:focus, select:focus {
      outline: none;
      border-color: #e91e63; /* Border berubah jadi pink cerah */
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.15); /* Glow pink di sekitar input */
    }

    /* Kelas utilitas untuk elemen full-width */
    .full { grid-column: 1 / -1; }

    /* Container Tombol */
    .submit { 
      grid-column: 1 / -1; 
      text-align: center; 
      margin-top: 12px; 
    }

    /* Desain Tombol Modern */
    button {
      width: 100%;
      background-color: #e91e63; /* Warna tombol utama pink cerah */
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.1s ease;
      box-shadow: 0 4px 6px rgba(233, 30, 99, 0.2);
    }

    /* Efek Hover Tombol */
    button:hover {
      background-color: #c2185b; /* Berubah jadi pink lebih tua saat diarahkan cursor */
    }

    /* Efek Klik Tombol */
    button:active {
      transform: scale(0.98);
    }

    /* Responsif untuk layar HP kecil */
    @media (max-width: 480px) {
      form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>Diabetes Prediction</h1>

  {% if prediction %}
    <div class="result">Hasil prediksi: {{ prediction }}</div>
  {% endif %}

  <form method="post" action="/predict">
    <div class="full">
      <label for="model">Model</label>
      <select id="model" name="model" required>
        {% for m in model_names %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
      </select>
    </div>

    <div><label>Pregnancies</label><input type="number" name="pregnancies" required></div>
    <div><label>Glucose</label><input type="number" name="glucose" required></div>
    <div><label>BloodPressure</label><input type="number" name="blood_pressure" required></div>
    <div><label>SkinThickness</label><input type="number" name="skin_thickness" required></div>
    <div><label>Insulin</label><input type="number" name="insulin" required></div>
    <div><label>BMI</label><input type="number" step="0.1" name="bmi" required></div>
    <div><label>DiabetesPedigreeFunction</label><input type="number" step="0.001" name="diabetes_pedigree" required></div>
    <div><label>Age</label><input type="number" name="age" required></div>

    <div class="submit"><button type="submit">Predict</button></div>
  </form>
</body>
</html>
